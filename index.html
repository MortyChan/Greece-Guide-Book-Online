<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>千载同希随行导览</title>
  <style>
    html,body{width:100%;height:100%;margin:0;background:#f5f5f7;overflow:hidden}
    iframe{display:block;width:100%;height:100dvh;border:0;background:#f5f5f7}
    .fallback{position:fixed;inset:auto 16px 16px;z-index:2;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.84);backdrop-filter:blur(20px);box-shadow:0 12px 34px rgba(0,0,0,.14);font:13px -apple-system,BlinkMacSystemFont,"Noto Sans SC","Microsoft YaHei",sans-serif;text-align:center}
    .fallback a{color:#06c;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <iframe id="guideFrame" src="github-upload-full/index.html" title="千载同希随行导览"></iframe>
  <noscript><p class="fallback"><a href="github-upload-full/index.html">进入导览</a></p></noscript>
  <script>
    const frame = document.getElementById('guideFrame');
    const teamHeaderHtml = `
      <section class="qztx-team-header" aria-label="支队信息">
        <div class="qztx-team-inner">
          <img src="assets/team-logo.svg" alt="千载同希支队 logo" loading="eager">
          <h1>日新书院“千载同希”赴希腊调研古典文明现代转化实践支队</h1>
        </div>
      </section>
    `;
    const fixCss = `
      .global-nav,.promo-ribbon{display:none!important}
      .shell{padding-top:0!important;padding-bottom:calc(132px + env(safe-area-inset-bottom))!important}
      .qztx-team-header{position:sticky!important;top:0!important;z-index:36!important;width:100vw!important;margin:0 0 20px calc(50% - 50vw)!important;min-height:44px!important;border-bottom:1px solid rgba(0,0,0,.08)!important;background:rgba(245,245,247,.86)!important;backdrop-filter:saturate(180%) blur(20px)!important;-webkit-backdrop-filter:saturate(180%) blur(20px)!important;color:#1d1d1f!important}
      .qztx-team-inner{width:min(1024px,calc(100% - 32px))!important;min-height:44px!important;margin:0 auto!important;display:flex!important;align-items:center!important;justify-content:center!important;gap:18px!important;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","Noto Sans SC","Microsoft YaHei",Arial,sans-serif!important}
      .qztx-team-header img{width:24px!important;height:24px!important;flex:0 0 24px!important;border-radius:6px!important;object-fit:contain!important;background:transparent!important;box-shadow:none!important}
      .qztx-team-header h1{margin:0!important;min-width:0!important;color:rgba(29,29,31,.9)!important;font-size:14px!important;line-height:1.2!important;letter-spacing:0!important;font-weight:600!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;text-align:center!important}
      .nav{position:fixed!important;left:50%!important;bottom:calc(16px + env(safe-area-inset-bottom))!important;z-index:20!important;width:min(520px,calc(100% - 28px))!important;transform:translateX(-50%)!important;display:flex!important;align-items:center!important;justify-content:space-between!important;gap:7px!important;padding:8px!important;border:1px solid rgba(255,255,255,.72)!important;border-radius:999px!important;background:linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.46)),radial-gradient(circle at 18% 12%,rgba(255,255,255,.96),rgba(255,255,255,0) 34%),radial-gradient(circle at 82% 88%,rgba(25,125,164,.18),rgba(25,125,164,0) 42%)!important;box-shadow:0 24px 70px rgba(18,23,34,.18),inset 0 1px 0 rgba(255,255,255,.92),inset 0 -18px 34px rgba(255,255,255,.22)!important;backdrop-filter:blur(28px) saturate(210%)!important;-webkit-backdrop-filter:blur(28px) saturate(210%)!important;overflow:hidden!important}
      .nav::before{content:""!important;position:absolute!important;inset:1px 16px auto!important;height:1px!important;background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent)!important;pointer-events:none!important}
      .nav::after{content:""!important;position:absolute!important;inset:0!important;border-radius:inherit!important;background:linear-gradient(90deg,rgba(255,255,255,.16),rgba(255,255,255,0) 42%,rgba(255,255,255,.2))!important;pointer-events:none!important}
      .nav a{position:relative!important;z-index:1!important;flex:1 1 0!important;min-height:50px!important;color:rgba(18,23,34,.68)!important;font-size:.86rem!important;border-radius:999px!important;transition:color 220ms var(--ease),background 220ms var(--ease),transform 220ms var(--ease),box-shadow 220ms ease!important}
      .nav a::before{content:""!important;position:absolute!important;inset:7px 10px!important;border-radius:inherit!important;background:rgba(255,255,255,.42)!important;opacity:0!important;transform:scale(.92)!important;transition:opacity 220ms var(--ease),transform 220ms var(--ease)!important}
      .nav a:hover::before,.nav a.is-active::before{opacity:1!important;transform:scale(1)!important}
      .nav a.is-active{color:#fff!important;background:linear-gradient(135deg,rgba(123,35,80,.94),rgba(25,125,164,.92))!important;box-shadow:0 12px 30px rgba(25,125,164,.26),inset 0 1px 0 rgba(255,255,255,.42)!important;transform:translateY(-1px)!important}
      .search-fab{width:58px!important;height:58px!important;right:max(18px,env(safe-area-inset-right))!important;bottom:calc(94px + env(safe-area-inset-bottom))!important}
      .search-panel{inset:auto max(18px,env(safe-area-inset-right)) calc(164px + env(safe-area-inset-bottom)) auto!important}
      #searchResults .info-card{cursor:pointer!important;position:relative!important;transition:transform 180ms var(--ease),box-shadow 180ms ease!important}
      #searchResults .info-card:hover{transform:translateY(-2px)!important;box-shadow:0 14px 30px rgba(0,0,0,.08)!important}
      #searchResults .info-card::after{content:"前往"!important;position:absolute!important;right:14px!important;top:14px!important;color:#06c!important;font-size:.78rem!important;font-weight:900!important}
      @media (max-width:430px){.qztx-team-header{min-height:48px!important;margin-bottom:14px!important}.qztx-team-inner{width:calc(100% - 22px)!important;min-height:48px!important;justify-content:flex-start!important;gap:10px!important}.qztx-team-header img{width:22px!important;height:22px!important;flex-basis:22px!important;border-radius:5px!important}.qztx-team-header h1{font-size:12.5px!important;text-align:left!important;line-height:1.25!important}.nav{width:calc(100% - 26px)!important;bottom:calc(12px + env(safe-area-inset-bottom))!important;padding:7px!important;gap:5px!important}.nav a{min-height:48px!important;font-size:.8rem!important;padding:0 4px!important}.search-fab{width:54px!important;height:54px!important;right:max(16px,env(safe-area-inset-right))!important;bottom:calc(92px + env(safe-area-inset-bottom))!important}.search-panel{inset:auto 10px calc(154px + env(safe-area-inset-bottom)) 10px!important;width:auto!important}}
    `;
    function wireSearchJump(doc) {
      const win = doc.defaultView;
      const results = doc.querySelector('#searchResults');
      if (!results || results.dataset.jumpReady === 'true') return;
      results.dataset.jumpReady = 'true';
      const sectionForType = { '行程': '#schedule', '常用语': '#prepare', '物资': '#prepare', '通讯录': '#prepare', '安全电话': '#safety', '调研': '#research' };
      const closePanel = () => {
        const panel = doc.querySelector('#searchPanel');
        panel?.classList.remove('is-open');
        panel?.setAttribute('aria-hidden', 'true');
      };
      const decorate = () => {
        results.querySelectorAll('.info-card').forEach(card => {
          if (card.dataset.jumpBound === 'true') return;
          const type = card.querySelector('.tag')?.textContent.trim() || '';
          const title = card.querySelector('h3')?.textContent.trim() || '';
          if (!sectionForType[type]) return;
          card.dataset.jumpBound = 'true';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.setAttribute('aria-label', `前往${type}：${title}`);
          const jump = () => {
            if (type === '行程') {
              const tab = [...doc.querySelectorAll('#dayTabs .tab-button')].find(button => title.includes(button.textContent.trim()));
              tab?.click();
            }
            if (type === '调研') {
              [...doc.querySelectorAll('#research details')].forEach(detail => {
                const summary = detail.querySelector('summary')?.textContent || '';
                if (summary.includes(title)) detail.open = true;
              });
            }
            const target = doc.querySelector(sectionForType[type]);
            closePanel();
            setTimeout(() => target?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
          };
          card.addEventListener('click', jump);
          card.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              jump();
            }
          });
        });
      };
      new win.MutationObserver(decorate).observe(results, { childList: true, subtree: true });
      const searchButton = doc.querySelector('#searchButton');
      const searchInput = doc.querySelector('#searchInput');
      searchButton?.addEventListener('click', () => setTimeout(decorate, 30));
      searchInput?.addEventListener('keydown', event => {
        if (event.key === 'Enter') setTimeout(decorate, 30);
      });
      decorate();
    }
    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument;
        const style = doc.createElement('style');
        style.setAttribute('data-mobile-polish','true');
        style.textContent = fixCss;
        doc.head.appendChild(style);
        const main = doc.querySelector('main.shell');
        if (main && !doc.querySelector('.qztx-team-header')) {
          main.insertAdjacentHTML('afterbegin', teamHeaderHtml);
        }
        wireSearchJump(doc);
      } catch (error) {
        window.location.replace('github-upload-full/index.html');
      }
    });
  </script>
</body>
</html>
